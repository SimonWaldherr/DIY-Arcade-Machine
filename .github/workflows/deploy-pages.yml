name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  PYGBAG_VERSION: "0.9.2"
  RUNTIME_VERSION: "0.9"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pygbag
        run: pip install pygbag==${{ env.PYGBAG_VERSION }}

      - name: Cache pygbag runtime
        id: cache-runtime
        uses: actions/cache@v4
        with:
          path: archives-main
          key: pygbag-runtime-${{ env.PYGBAG_VERSION }}

      - name: Download & prepare pygbag runtime
        if: steps.cache-runtime.outputs.cache-hit != 'true'
        run: |
          curl -fsSL https://github.com/pygame-web/archives/archive/refs/heads/main.zip \
            -o pygame-web-archives.zip
          unzip -q pygame-web-archives.zip 'archives-main/${{ env.RUNTIME_VERSION }}/*'
          rm pygame-web-archives.zip
          find archives-main/${{ env.RUNTIME_VERSION }} -type f -name '*.js' \
            -exec perl -ni -e 'print unless m{^//# sourceMappingURL=.*\.map\s*$}' {} +

      - name: Build with pygbag
        run: |
          mkdir -p build/src
          cp main.py arcade_app.py logo.png build/src/
          [ -f highscores.json ] && cp highscores.json build/src/ || true
          python -m pygbag \
            --ume_block 0 \
            --width 640 \
            --height 640 \
            --title "DIY Arcade Machine" \
            --icon logo.png \
            --cdn "./archives/${{ env.RUNTIME_VERSION }}/" \
            --template "${{ github.workspace }}/web/default.tmpl" \
            --build build/src
          mkdir -p dist
          cp -R build/src/build/web/. dist/
          cp web/coi-serviceworker.js dist/
          mkdir -p dist/archives
          cp -R archives-main/${{ env.RUNTIME_VERSION }} dist/archives/

      - name: Verify runtime assets
        run: |
          grep -F 'xtermjs: "vt/xterm.js"' dist/index.html
          ! grep -F "archives/${{ env.RUNTIME_VERSION }}/archives/${{ env.RUNTIME_VERSION }}" dist/index.html
          for f in \
            dist/archives/${{ env.RUNTIME_VERSION }}/pythons.js \
            dist/archives/${{ env.RUNTIME_VERSION }}/browserfs.min.js \
            dist/archives/${{ env.RUNTIME_VERSION }}/vt/xterm.js \
            dist/archives/${{ env.RUNTIME_VERSION }}/vt/xterm-addon-image.js \
            dist/archives/${{ env.RUNTIME_VERSION }}/vt/xterm.css; do
            test -f "$f" || { echo "Missing: $f"; exit 1; }
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
