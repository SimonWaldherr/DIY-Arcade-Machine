name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pygbag
        run: pip install pygbag==0.9.2

      - name: Download pygbag runtime
        run: |
          curl -L https://github.com/pygame-web/archives/archive/refs/heads/main.zip -o pygame-web-archives.zip
          unzip -q pygame-web-archives.zip 'archives-main/0.9/*'
          find archives-main/0.9 -type f -name '*.js' -exec perl -ni -e 'print unless m{^//# sourceMappingURL=.*\.map\s*$}' {} +

      - name: Build with pygbag
        run: |
          mkdir -p build/src
          cp main.py arcade_app.py logo.png build/src/
          if [ -f highscores.json ]; then cp highscores.json build/src/; fi
          python -m pygbag \
            --ume_block 0 \
            --width 640 \
            --height 640 \
            --title "DIY Arcade Machine" \
            --icon logo.png \
            --cdn "./archives/0.9/" \
            --template "${{ github.workspace }}/web/default.tmpl" \
            --build build/src
          mkdir -p dist
          cp -R build/src/build/web/. dist/
          cp web/coi-serviceworker.js dist/
          mkdir -p dist/archives
          cp -R archives-main/0.9 dist/archives/
          test -f dist/archives/0.9/pythons.js
          test -f dist/archives/0.9/browserfs.min.js
          test -f dist/archives/0.9/vt/xterm.js
          test -f dist/archives/0.9/vt/xterm-addon-image.js
          test -f dist/archives/0.9/vt/xterm.css

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
