name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Top-level read permission; write permissions scoped to the deploy job.
permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build web bundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install pygame-ce pygbag==0.9.3

      - name: Syntax check
        run: python -m py_compile main.py arcade_app.py

      - name: Build web bundle
        # pygbag --build reads main.py from the current directory and writes
        # the WebAssembly bundle to build/web/.  The CDN runtime is fetched
        # automatically; no manual archive download is required.
        run: |
          python -m pygbag \
            --ume_block 0 \
            --width 640 \
            --height 640 \
            --title "DIY Arcade Machine" \
            --icon logo.png \
            --build .

      - name: Verify build output
        # Fail fast if pygbag did not produce the expected entry point.
        run: test -f build/web/index.html || { echo "build/web/index.html missing"; exit 1; }

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: build/web

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    # Pages deployment needs write access to pages and an OIDC token.
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
